syntax = "proto3";

option go_package = "github.com/scionproto/scion/go/pkg/proto/control_plane";

package proto.control_plane.v1;

message PathSegmentExtensions {
    // Optional static info extension.
    StaticInfoExtension static_info = 1;
    // Optional hidden path extension.
    HiddenPathExtension hidden_path = 2;
}

message HiddenPathExtension {
    // Indicate if this is a hidden path.
    bool is_hidden = 1;
}

message StaticInfoExtension {
    // The approximate, lower-bound latency information for this ASEntry.
    LatencyInfo latency = 1;
    // Geographical coordinates describing the location of the routers for relevant interfaces of this AS.
    // The key is the interface identifier.
    map<uint64, GeoCoordinates> geo = 2;
    // Description of the underlying network for the intra-AS links, for the relevant interfaces of this AS.
    // The key is the interface identifier.
    map<uint64, LinkType> link_type = 3;
    BandwidthInfo bandwidth = 4;
    InternalHopsInfo internal_hops = 5;
    // Generic note
    string note = 6;
}

// LatencyInfo specifies approximate lower-bound latency values.
// The separate intra, inter, cross-over and peering information allows to reconstruct
// latency values for all paths based on this ASEntry.
// All values are in milliseconds. 
// TODO(matzf): I think this should be changed to microseconds -- the range for uint32 makes more sense.
message LatencyInfo {
    // Latency from beaconing-ingress to beaconing-egress interface in local AS.
    uint32 intra = 1;
    // Latency from beaconing-egress interface to beaconing-ingress interface in neighbor AS.
    uint32 inter = 2;
    // Latency from beaconing-egress interface to sibling child or core interfaces.
    // The key is the interface identifier of the sibling child or core interface.
    map<uint64, uint32> xover_intra = 3;
    // Latency from beaconing-egress interface to peers.
    // The key is the interface identifier of the peering interface.
    map<uint64, PeerInfo> peers = 4;

    message PeerInfo {
        // Latency from beaconing-egress interface to the local peering interface.
        uint32 intra = 1;
        // Latency from the local peering interface to the peering interface in neighbor AS.
        uint32 inter = 2;
    }
}

message GeoCoordinates {
    // The latitude of the geographic coordinate, in the WGS 84 datum.
    float latitude = 1;
    // The longitude of the geographic coordinate, in the WGS 84 datum.
    float longitude = 2;
    // The civic address of the location.
    string address = 3;
}

enum LinkType {
    // Direct physical connection.
    DIRECT = 0;
    // Connection with local routing/switching.
    MULTI_HOP = 1;
    // Connection overlayed over publicly routed Internet.
    OPEN_NET = 2;
}

message BandwidthInfo {
    uint32 intra = 1;
    uint32 inter = 2;
    // Bandwidth between beaconing-egress interface and sibling child or core interfaces.
    // The key is the interface identifier of the sibling child or core interface.
    map<uint64, uint32> xover_intra = 3;
    // Bandwidth between beaconing-egress interface and peers.
    // The key is the interface identifier of the peering interface.
    map<uint64, PeerInfo> peers = 4;

    message PeerInfo {
        // Bandwidth between beaconing-egress interface and the local peering interface.
        uint32 intra = 1;
        // Bandwidth between the local peering interface and the peering interface in neighbor AS.
        uint32 inter = 2;
    }
}

message InternalHopsInfo {
    // Number of AS internal hops between the beaconing-ingress and the beaconing-egress interface.
    uint32 hops = 1;
    // Number of AS internal hops between the beaconing-egress and sibling
    // child, core or peer interfaces.
    map<uint64, uint32> xover_hops = 2;
}
