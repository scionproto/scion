version: 2
defaults:
    job: &job
        working_directory: /home/scion/go/src/github.com/netsec-ethz/scion
        environment: &environment
            - BASH_ENV: /home/scion/.bash_profile
    env_setup: &env_setup
        name: Set up environment variables
        command: |
            echo '
            export GOPATH=$HOME/go
            export GOBIN=$GOPATH/bin
            export PATH=$GOBIN:$HOME/.local/bin:$PATH
            BRANCH="${${CIRCLE_PR_NUMBER:-$CIRCLE_BRANCH}//\//_}"
            export ARTIFACTS="circleci.${CIRCLE_PROJECT_REPONAME}.${BRANCH}.build${CIRCLE_BUILD_NUM}"
            ' >> ~/.bash_profile
    artifacts: &artifacts
        name: Gather test artifacts
        command: |
            set +e -x
            mkdir "/tmp/${ARTIFACTS:?}" "/tmp/artifacts.out" || exit 1
            cp -a htmlcov "/tmp/$ARTIFACTS/coverage"
            cp -a logs "/tmp/$ARTIFACTS/"
            cp -a go/gocover.html "/tmp/$ARTIFACTS/"
            cp -a gen "/tmp/$ARTIFACTS/"
            tar czf "/tmp/artifacts.out/$ARTIFACTS.tar.gz" -C /tmp "$ARTIFACTS" || exit 1
    post_check: &post_check
        name: Post-run error check
        command: |
            [ -f /tmp/test_flags/errors ] || exit 0
            echo "ERROR: the following actions failed:"
            echo "===================================="
            cat /tmp/test_flags/errors
            echo "===================================="
            exit 1

jobs:
    local:
        docker:
            - image: scion:latest
        <<: *job

        steps:
            - run:
                <<: *env_setup
            # The build prep step from the `build` job isn't needed here, as
            # the scion docker image has already done the work for us.

            # Common:
            - run: make -s
            - run: ./docker/ci_run ./scion.sh lint
            - run: ./docker/ci_run ./scion.sh coverage
            - run: ./docker/ci_run ./sub/web/manage.py test > logs/sweb_test.log
            - run: ./docker/ci_run ./docker/integration_test.sh
            - run: *artifacts

            - run: mv /tmp/${ARTIFACTS:?}/* artifacts/
            - run: *post_check

    build:
        docker:
            - image: kormat/scion_base@sha256:a6703ac8db10cc7b39fe443d253b29326c40baa752dea215da7847717deb9418
        <<: *job
        steps:
            - run:
                <<: *env_setup

            - checkout
            - run:
                name: Build prep
                command: |
                    set -x
                    git submodule sync --recursive
                    git submodule update --init --recursive
                    # Ensure none of the dependency information has changed
                    # since scion_base was last built.
                    ./docker/deps_check
                    # Restore the go dependency cache from scion_base
                    tar xzf /tmp/build/go_vendor.tar.gz -C go/vendor/
                    # Syncing should be a no-op, just need installation to run
                    make -C go deps
                    cp sub/web/web_scion/settings/private.dist.py sub/web/web_scion/settings/private.py
                    ./sub/web/manage.py makemigrations
                    ./scion.sh topology

            # Common:
            - run: make -s
            - run: ./docker/ci_run ./scion.sh lint
            - run: ./docker/ci_run ./scion.sh coverage
            - run: ./docker/ci_run ./sub/web/manage.py test > logs/sweb_test.log
            - run: ./docker/ci_run ./docker/integration_test.sh
            - run: *artifacts
            - run: *post_check

            - store_artifacts:
                path: /tmp/artifacts.out
                destination: /
            - store_test_results:
                path: logs/nosetests.xml

